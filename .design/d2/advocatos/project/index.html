<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<title>Advocatos</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet" />
<style>
  html { color-scheme: light; }
  :root {
    color-scheme: light;
    --bg: oklch(0.985 0.003 100);
    --bg-alt: oklch(0.975 0.004 100);
    --surface: #ffffff;
    --surface-2: oklch(0.99 0.003 100);
    --border: oklch(0.92 0.005 100);
    --border-strong: oklch(0.86 0.006 100);
    --text: oklch(0.22 0.012 260);
    --text-2: oklch(0.45 0.012 260);
    --text-3: oklch(0.62 0.01 260);
    --accent: oklch(0.42 0.08 250);
    --accent-soft: oklch(0.95 0.02 250);
    --accent-line: oklch(0.85 0.03 250);
    --live: oklch(0.62 0.14 155);
    --live-soft: oklch(0.95 0.04 155);
    --warn: oklch(0.7 0.12 60);
    --shadow-1: 0 1px 0 rgba(20, 25, 45, 0.04), 0 1px 2px rgba(20, 25, 45, 0.04);
    --shadow-2: 0 8px 24px rgba(20, 25, 45, 0.07), 0 1px 0 rgba(20, 25, 45, 0.05);
    --shadow-window: 0 0 0 1px rgba(0,0,0,0.10), 0 30px 80px rgba(20,25,45,0.28), 0 12px 32px rgba(20,25,45,0.18);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
    --font-ui: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --font-display: "Fraunces", Georgia, serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-ui);
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 20% -10%, oklch(0.93 0.03 250 / 0.4), transparent 60%),
      radial-gradient(900px 500px at 110% 110%, oklch(0.94 0.04 80 / 0.35), transparent 60%),
      oklch(0.92 0.01 250);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
    overflow: hidden;
  }

  /* Reset focus rings to something more refined */
  button { font-family: inherit; cursor: pointer; }
  input, button, select, textarea { font-family: inherit; color: inherit; }
  input:focus, select:focus, textarea:focus, button:focus { outline: none; }

  /* Numbers should be tabular monospace where shown */
  .mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }
  .num { font-variant-numeric: tabular-nums; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: oklch(0.85 0.005 100); border-radius: 6px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(0.78 0.005 100); border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Live blinking dot */
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.85); }
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 3px oklch(0.62 0.14 155 / 0.18);
    animation: pulse-dot 1.6s ease-in-out infinite;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" data-presets="react" src="icons.jsx"></script>
  <script type="text/babel" data-presets="react" src="ui.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
